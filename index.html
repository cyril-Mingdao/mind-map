<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 邏輯心智圖大綱生成系統 (V1.4)</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
    <style>
        :root {
            --primary-color: #1A237E;
            --secondary-color: #00BCD4;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --error-color: #f44336;
            --success-color: #4CAF50;
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 100%; 
            margin: 0;
            box-sizing: border-box;
        }
        .header-container {
            position: relative;
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 15px;
        }
        h1 { color: var(--primary-color); margin: 0; }
        .subtitle { color: #666; font-size: 1.1rem; font-weight: bold; margin-top: 5px; }

        #settings-section {
            background: #e8eaf6;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: block; 
            border: 1px solid #c5cae9;
        }
        .settings-toggle {
            text-align: right;
            margin-bottom: 10px;
        }
        .toggle-btn {
            background: none;
            border: none;
            color: var(--primary-color);
            text-decoration: underline;
            cursor: pointer;
            font-weight: bold;
        }

        .container {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin: 0 10px;
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: var(--primary-color); }
        
        textarea, input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        textarea { height: 250px; resize: vertical; }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: 0.3s;
        }
        .btn:hover { background-color: #283593; transform: translateY(-2px); }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; }

        .output-container {
            margin-top: 30px;
            display: none;
            margin-left: 10px;
            margin-right: 10px;
        }
        .result-box {
            background: #272822;
            color: #f8f8f2;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Consolas', 'Monaco', monospace;
            white-space: pre-wrap;
            overflow-x: auto;
            border-left: 5px solid var(--secondary-color);
        }
        .toolbar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 10px;
        }
        .tool-btn {
            padding: 6px 15px;
            cursor: pointer;
            border-radius: 4px;
            border: 1px solid #ddd;
            background: #fff;
            font-size: 14px;
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .tool-btn:hover { background: #f5f5f5; border-color: #bbb; }

        #status {
            text-align: center;
            margin: 15px 0;
            padding: 12px;
            border-radius: 6px;
            display: none;
            font-weight: bold;
        }
        
        .settings-footer {
            margin-top: 15px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            flex-wrap: wrap;
        }

        .msg-area {
            font-size: 0.9rem;
            margin-top: 5px;
            font-weight: normal;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>AI 邏輯心智圖大綱生成器 (V1.4)</h1>
        <p class="subtitle">詹宗龍 製作</p>
    </div>

    <div class="container">
        <div class="settings-toggle">
            <button class="toggle-btn" onclick="toggleSettings()">⚙️ 顯示/隱藏系統設定</button>
        </div>
        
        <div id="settings-section">
            <h3>🔑 系統設定</h3>
            <div class="form-group">
                <label>Google Gemini API Key:</label>
                <input type="password" id="apiKey" placeholder="在此輸入您的 API Key">
            </div>
            <div class="form-group">
                <label>選擇 AI 模型：</label>
                <select id="modelSelect">
                    <optgroup label="最新世代 (2026)">
                        <option value="gemini-3-flash">Gemini 3.0 Flash (推理增強版)</option>
                        <option value="gemini-3-flash-preview" selected>Gemini 3.0 Flash Preview</option>
                    </optgroup>
                    <optgroup label="代理人世代 (2025)">
                        <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
                        <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                    </optgroup>
                    <optgroup label="經典世代">
                        <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
                        <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                    </optgroup>
                </select>
            </div>
            <div class="settings-footer">
                <a href="https://sites.google.com/ms.mingdao.edu.tw/tsiam/1/%E5%85%8D%E8%B2%BB%E7%94%B3%E8%AB%8Bapi" target="_blank" class="tool-btn" style="color: #0277bd; border-color: #0277bd;">🆓 免費申請 API</a>
                <button class="tool-btn" onclick="clearAPIKey()" style="color: var(--error-color); border-color: var(--error-color);">🗑️ 清除 API</button>
                <button class="tool-btn" id="saveSettingsBtn" onclick="saveSettings()" style="background: var(--primary-color); color: white;">💾 儲存設定</button>
            </div>
            <div id="save-msg" class="msg-area"></div>
        </div>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

        <div class="form-group">
            <label for="sourceText">📄 請貼上原始文章或課文內容：</label>
            <textarea id="sourceText" placeholder="請將長文或課文貼在此處..."></textarea>
        </div>

        <div class="form-group">
            <label for="focusMode">🎯 拆解偏好：</label>
            <select id="focusMode">
                <option value="general">綜合邏輯拆解 (MECE 標準模式)</option>
                <option value="action">行動方案導向 (SOP 與具體步驟)</option>
                <option value="analysis">深度分析導向 (優劣、特徵、風險)</option>
                <option value="concept">概念連結模式 (底層邏輯與原理)</option>
            </select>
        </div>

        <button class="btn" id="generateBtn" onclick="generateMindMap()">🚀 開始邏輯萃取</button>
        <div id="status"></div>
    </div>

    <div class="output-container" id="outputSection">
        <div class="toolbar">
            <button class="tool-btn" onclick="copyContent()">📋 複製大綱</button>
            <button class="tool-btn" onclick="downloadMarkdown()">💾 下載 Markdown</button>
        </div>
        <div class="result-box" id="resultDisplay"></div>
    </div>

    <script>
        window.onload = () => {
            const savedKey = localStorage.getItem('mindmap_api_key');
            const savedModel = localStorage.getItem('mindmap_model');
            if (savedKey) {
                document.getElementById('apiKey').value = savedKey;
                if (savedModel) document.getElementById('modelSelect').value = savedModel;
                document.getElementById('settings-section').style.display = 'none';
            }

            // 監聽 Enter 鍵觸發生成功能
            document.addEventListener('keydown', function(event) {
                // 判斷是否為 Enter 鍵，且不是在文字輸入區域 (textarea) 換行
                if (event.key === 'Enter' && event.target.tagName !== 'TEXTAREA') {
                    event.preventDefault(); // 防止預設行為
                    generateMindMap();
                }
            });
        }

        function toggleSettings() {
            const section = document.getElementById('settings-section');
            section.style.display = (section.style.display === 'none') ? 'block' : 'none';
        }

        function saveSettings() {
            const key = document.getElementById('apiKey').value.trim();
            const model = document.getElementById('modelSelect').value;
            const msg = document.getElementById('save-msg');
            
            if (key) {
                localStorage.setItem('mindmap_api_key', key);
                localStorage.setItem('mindmap_model', model);
                msg.innerText = "✅ 設定已儲存！";
                msg.style.color = "green";
                setTimeout(() => { 
                    msg.innerText = ""; 
                    document.getElementById('settings-section').style.display = 'none';
                }, 1500);
            } else {
                msg.innerText = "❌ 請輸入有效的 API Key";
                msg.style.color = "red";
            }
        }

        function clearAPIKey() {
            localStorage.removeItem('mindmap_api_key');
            document.getElementById('apiKey').value = "";
            const msg = document.getElementById('save-msg');
            msg.innerText = "🗑️ API 已清除";
            msg.style.color = "orange";
        }

        async function generateMindMap() {
            const apiKey = document.getElementById('apiKey').value;
            const sourceText = document.getElementById('sourceText').value.trim();
            const model = document.getElementById('modelSelect').value;
            const mode = document.getElementById('focusMode').value;

            if (!apiKey) {
                alert("請先完成 API 設定 (點擊上方設定按鈕)");
                document.getElementById('settings-section').style.display = 'block';
                return;
            }
            if (!sourceText) {
                alert("請貼上文章內容");
                return;
            }

            const btn = document.getElementById('generateBtn');
            const status = document.getElementById('status');
            
            if (btn.disabled) return; // 防止重複點擊

            btn.disabled = true;
            btn.innerText = "🧠 正在進行深度結構化分析...";
            status.style.display = "block";
            status.innerText = `使用 ${model} 模型進行邏輯萃取中...`;
            status.style.backgroundColor = "#e3f2fd";
            status.style.color = "#0277bd";

            const prompt = `
角色設定：
你是一位專業的資訊架構師與思維導圖專家，擅長將複雜的長文萃取成結構清晰、邏輯嚴密的心智圖大綱。

任務目標：
請閱讀以下提供的文章或課文，並將其轉化為心智圖結構。
偏好模式：${mode}

層次結構規範（嚴格遵守）：
1. 格式採用：
   一、 中心主題 (標題 1)
   (一) 一級分支 (標題 2)
   1. 二級分支 (標題 3)
   (1) 三級分支 (標題 4)

2. 內容規範：
   - 【中心主題】：請下一個 5 字以內的精煉標題。
   - 【一級與二級分支】：嚴禁長句。請濃縮為「名詞 + 動詞」或單一「關鍵詞」，節點限制在 6 個字以內。
   - 【三級分支】：此層級請「直接列出課文中的句子」，不需縮減，以利保留原文精華。

3. 邏輯要求：
   - 一級分支必須控制在 5 個以內。
   - 符合 MECE 原則（互斥且窮盡）。

---
文章內容：
${sourceText}
`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { temperature: 0.3 }
                    })
                });

                if (!response.ok) throw new Error("API 請求失敗");

                const data = await response.json();
                const result = data.candidates[0].content.parts[0].text;

                document.getElementById('resultDisplay').innerText = result;
                document.getElementById('outputSection').style.display = 'block';
                status.innerText = "✅ 心智圖大綱萃取成功！";
                status.style.backgroundColor = "#e8f5e9";
                status.style.color = "#2e7d32";
                
                document.getElementById('outputSection').scrollIntoView({ behavior: 'smooth' });

            } catch (error) {
                console.error(error);
                status.innerText = "❌ 生成失敗：請確認 API Key 是否有效。";
                status.style.backgroundColor = "#ffebee";
                status.style.color = "#c62828";
            } finally {
                btn.disabled = false;
                btn.innerText = "🚀 開始邏輯萃取";
            }
        }

        function copyContent() {
            const text = document.getElementById('resultDisplay').innerText;
            const dummy = document.createElement("textarea");
            document.body.appendChild(dummy);
            dummy.value = text;
            dummy.select();
            document.execCommand("copy");
            document.body.removeChild(dummy);
            alert("已複製！");
        }

        function downloadMarkdown() {
            const text = document.getElementById('resultDisplay').innerText;
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Mindmap_Outline_V1.4.txt`;
            a.click();
        }
    </script>
</body>
</html>
